name: studystack

services:
  postgres:
    image: postgres:17.7-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  app:
    image: studystack-app:local
    build:
      context: ../server
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      STUDYSTACK_ADMIN_GITHUB_IDS: ${STUDYSTACK_ADMIN_GITHUB_IDS}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://localhost:8080/actuator/health/readiness > /dev/null || exit 1
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  caddy:
    image: studystack-web:local
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${CADDY_HTTP_PORT}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  postgres-data:
