spring:
  application:
    name: studystack
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  security:
    oauth2:
      client:
        registration:
          github:
            scope: read:user
  session:
    store-type: jdbc
    timeout: ${studystack.identity.security.session-timeout}
    jdbc:
      initialize-schema: never
      cleanup-cron: "0 */10 * * * *"
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:studystack}
    username: ${DB_USER:studystack}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  servlet:
    session:
      cookie:
        name: ${studystack.identity.security.cookie.name}
        http-only: ${studystack.identity.security.cookie.http-only}
        same-site: ${studystack.identity.security.cookie.same-site}
        path: ${studystack.identity.security.cookie.path}
        secure: ${studystack.identity.security.cookie.secure}

studystack:
  identity:
    security:
      session-timeout: 24h
      cookie:
        name: STUDYSTACK_SESSION
        http-only: true
        same-site: Lax
        path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
