spring:
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:EXAMPLE_ONLY_GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET:EXAMPLE_ONLY_GITHUB_CLIENT_SECRET}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:studystack}
    username: ${DB_USER:studystack}
    password: ${DB_PASSWORD}

studystack:
  public-base-url: ${STUDYSTACK_PUBLIC_BASE_URL:http://localhost:5173}
  identity:
    security:
      admin-github-ids: ""
      cookie:
        secure: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
